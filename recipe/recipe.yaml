context:
  version: "11.1.0"
  major: 10

package:
  name: octave
  version: ${{ version }}

source:
  url:
    - https://ftp.gnu.org/gnu/octave/octave-${{ version }}.tar.gz
    - https://ftpmirror.gnu.org/octave/octave-${{ version }}.tar.gz
  sha256: c0e7e2c91bc573256431b2cc989290b9bd13851dbadd59d0ac74714f1334b0e6

build:
  number: 0
  skip:
    - if: win
      then: true

  prefix_detection:
    force_file_type:
      binary:
        - if: linux
          then:
            - bin/octave-${{ version }}


requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
    - ${{ compiler("cxx") }}
    - ${{ compiler("fortran") }}
    - make
    - automake
    - sed
    - perl
    - ghostscript
    - pkg-config
    - bison
    - gperf
    - if: linux
      then:
        - libgomp
    - if: osx
      then:
        - llvm-openmp

  host:
    - libblas
    - libcblas
    - liblapack
    - liblapacke
    - pcre
    - ghostscript
    - pkg-config
    - sundials
    - readline
    - arpack
    - curl
    - libcurl
    - fftw
    - fontconfig
    - freetype
    - glpk
    - gnuplot
    - hdf5
    - suitesparse
    - zlib
    - bzip2
    - portaudio
    - libsndfile
    - qscintilla2
    - qhull
    - graphicsmagick
    - icu
    - ncurses
    - liblzma-devel
    - libxml2-devel
    - libpng
    - glib
    - qt-main
    - openssl
    - texinfo
    - gl2ps
    - fltk
    - libiconv
    - rapidjson
    - if: linux
      then:
        - libglu
        - libgl-devel
        - alsa-lib
        - xorg-xorgproto
        - xorg-libxrender
        - xorg-libxfixes
        - xorg-libx11
        - xorg-libxext

  run:
    - ghostscript
    - texinfo
    - gl2ps
    - fltk
    - pcre
    - readline
    - arpack
    - curl
    - sundials
    - ${{ pin_compatible("fftw", upper_bound="x.x") }}
    - fontconfig
    - freetype
    - glpk
    - gnuplot
    - hdf5
    - ${{ pin_compatible("suitesparse", upper_bound="x.x") }}
    - zlib
    - bzip2
    - ${{ pin_compatible("portaudio") }}
    - libsndfile
    - ${{ pin_compatible("qscintilla2", upper_bound="x.x") }}
    - qhull
    - ${{ pin_compatible("graphicsmagick") }}
    - icu
    - ncurses
    - liblzma-devel
    - libxml2-devel
    - libpng
    - glib
    - qt-main
    - openssl
    - if: linux
      then:
        - libglu

  run_exports:
    - ${{ pin_subpackage("octave", upper_bound="x") }}

tests:
  - requirements:
      run:
        - coreutils
    script: |
      octave --version
      touch test_file.txt
      octave test_file.txt
      octave --eval "imwrite(uint8(rand(20,20,3).*255),'test.jpg')"
      octave --eval "help pkg"
      octave --eval "path"

about:
  homepage: https://www.gnu.org/software/octave/
  license: GPL-3.0-or-later
  license_file: COPYING
  summary: GNU Octave is a high-level language, primarily intended for numerical computations
  documentation: https://www.gnu.org/software/octave/doc/interpreter/

extra:
  recipe-maintainers:
    - IsabelParedes
    - SylvainCorlay
    - isuruf
    - ocefpaf
    - izahn
    - ngam
    - matthiasdiener
